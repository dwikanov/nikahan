<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Spesial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .header {
            font-size: 24px;
            font-weight: bold;
            color: #4caf50;
        }
        .invitee {
            font-size: 18px;
            font-weight: bold;
            color: #ff5722;
        }
        .details {
            margin-top: 20px;
            font-size: 16px;
        }
        .countdown {
            font-size: 20px;
            font-weight: bold;
            color: #e91e63;
            margin-top: 20px;
        }
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Undangan Spesial</div>
        <div class="invitee" id="invitee-name">[Nama Penerima]</div>
        <div class="details">
            <p>Anda diundang untuk menghadiri acara spesial kami!</p>
            <p>Waktu: Minggu, 12 Januari 2025, 18:00 WIB</p>
            <p>Tempat: Tanah Kita Wetan Ndweso</p>
        </div>
        <div class="countdown" id="countdown">00d 00h 00m 00s</div>
        <div class="footer">
            <p>Harap konfirmasi kehadiran Anda melalui telepon atau email.</p>
            <p>Kami berharap dapat bertemu Anda di acara ini!</p>
        </div>
    </div>

    <script>
        // Function to get the invitee name from the URL
        function getInviteeName() {
            const urlParams = new URLSearchParams(window.location.search);
            return decodeURIComponent(urlParams.get('name'));
        }

        // Function to load invitee names from the JSON file hosted on a server
        async function loadInviteeNames() {
            const url = 'https://dwikanov.github.io/nikahan/invitees.json';
            const response = await fetch(url);
            const invitees = await response.json();
            const inviteeName = getInviteeName();

            // Find the invitee in the JSON file
            const invitee = invitees.find(i => i['Invitee Name'] === inviteeName);
            if (invitee) {
                document.getElementById('invitee-name').textContent = inviteeName;
            } else {
                document.getElementById('invitee-name').textContent = 'Nama tidak ditemukan';
            }
        }

        // Countdown Timer
        function startCountdown() {
            const eventDate = new Date('January 12, 2025 18:00:00 GMT+07:00').getTime();
            const countdownElement = document.getElementById('countdown');

            const interval = setInterval(() => {
                const now = new Date().getTime();
                const distance = eventDate - now;

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                countdownElement.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;

                if (distance < 0) {
                    clearInterval(interval);
                    countdownElement.textContent = 'Acara telah dimulai!';
                }
            }, 1000);
        }

        // Call the functions to load invitee names and start the countdown timer
        loadInviteeNames();
        startCountdown();
    </script>
</body>
</html>
